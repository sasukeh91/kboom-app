workflows:
  ios-workflow:
    name: K-Boom iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      node: v20
      vars:
        APP_ID: ro.kboom.app
        APP_NAME: "K-Boom"
    scripts:
      - name: Prepare API key
        script: |
          echo "$ASC_KEY_B64" | base64 -d | tr -d '\r' > /tmp/AuthKey.p8
          echo "=== Key debug ==="
          head -1 /tmp/AuthKey.p8
          tail -1 /tmp/AuthKey.p8
          echo "Lines: $(wc -l < /tmp/AuthKey.p8)"
          echo "Key ID: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer: $APP_STORE_CONNECT_ISSUER_ID"
          openssl pkey -in /tmp/AuthKey.p8 -check -noout 2>&1 || echo "KEY CHECK FAILED"

      - name: Initialize keychain and fetch signing files
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 -d | tr -d '\r' > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --certificate-key @file:/tmp/cert_key.pem
          keychain add-certificates

      - name: Install dependencies
        script: npm install

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli @capacitor/assets

      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Generate app icons
        script: |
          ICON_DIR=$(find ios -name "AppIcon.appiconset" -type d | head -1)
          echo "AppIcon dir: $ICON_DIR"
          if [ -z "$ICON_DIR" ]; then
            echo "ERROR: no AppIcon.appiconset found"
            find ios -type d | grep -i icon
            exit 1
          fi
          sips -z 1024 1024 resources/icon.png -s format jpeg --out /tmp/icon_noa.jpg
          sips /tmp/icon_noa.jpg -s format png --out "$ICON_DIR/AppIcon.png"
          echo "Alpha stripped, icon written to $ICON_DIR/AppIcon.png"
          ls -la "$ICON_DIR/"
          printf '{\n  "images": [\n    {\n      "filename": "AppIcon.png",\n      "idiom": "universal",\n      "platform": "ios",\n      "size": "1024x1024"\n    }\n  ],\n  "info": {\n    "author": "xcode",\n    "version": 1\n  }\n}\n' > "$ICON_DIR/Contents.json"
          echo "Contents.json written"

      - name: Copy web assets
        script: npx cap copy ios

      - name: Update iOS project
        script: npx cap update ios

      - name: Set permissions and export compliance
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Apply provisioning profiles
        script: xcode-project use-profiles

      - name: Set app version
        script: |
          echo "=== Version Debug ==="
          echo "Key ID: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer: $APP_STORE_CONNECT_ISSUER_ID"
          RAW_BUILD=$(app-store-connect get-latest-build-number "$APP_ID" \
            --platform IOS \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" 2>&1) || true
          echo "Raw output: '$RAW_BUILD'"
          CURRENT_BUILD=$(echo "$RAW_BUILD" | grep -E '^[0-9]+$' | tail -1)
          GIT_COUNT=$(git rev-list --count HEAD)
          CURRENT_BUILD=${CURRENT_BUILD:-$GIT_COUNT}
          echo "CURRENT_BUILD: $CURRENT_BUILD"
          NEW_BUILD=$((CURRENT_BUILD + 1))
          echo "NEW_BUILD: $NEW_BUILD"
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all $NEW_BUILD
        working_directory: ios/App

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path build/ios/ipa/App.ipa \
            --private-key @file:/tmp/AuthKey.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  android-workflow:
    name: K-Boom Android Build
    max_build_duration: 60
    environment:
      java: 17
      node: v20
      groups:
        - android_signing
      vars:
        APP_ID: ro.kboom.app
        APP_NAME: "K-Boom"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli @capacitor/assets

      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate app icons
        script: npx @capacitor/assets generate --android

      - name: Copy web assets
        script: npx cap copy android

      - name: Update Android project
        script: npx cap update android

      - name: Set app version
        script: |
          VERSION_CODE=1
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "1.0.0"/' android/app/build.gradle

      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease

      - name: Sign AAB
        script: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            android/app/build/outputs/bundle/release/app-release.aab \
            "$KEY_ALIAS"

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
